<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Atrapa corazones · Móvil + Desktop</title>
  <style>
    /* ===== ESTILOS ROMÁNTICOS Y ADAPTABLES ===== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      user-select: none;
      -webkit-tap-highlight-color: transparent; /* elimina flash en taps móvil */
    }

    body {
      min-height: 100vh;
      background: linear-gradient(145deg, #ffdde1 0%, #f9c9d1 100%);
      font-family: 'Segoe UI', 'Quicksand', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0;
      padding: 10px;
      position: relative;
      overflow: hidden; /* evita scroll por decoración */
      touch-action: pan-y; /* permite scroll vertical si es necesario, pero no horizontal */
    }

    /* Fondo con sutiles corazones flotantes (decoración) */
    body::before {
      content: "❤️";
      position: absolute;
      font-size: 4rem;
      opacity: 0.08;
      top: 5%;
      left: 3%;
      transform: rotate(-10deg);
      animation: levitate 8s infinite alternate ease-in-out;
    }

    body::after {
      content: "❤️";
      position: absolute;
      font-size: 6rem;
      opacity: 0.08;
      bottom: 10%;
      right: 2%;
      transform: rotate(15deg);
      animation: levitate 10s infinite alternate-reverse ease-in-out;
    }

    @keyframes levitate {
      0% { transform: translateY(0px) rotate(-10deg) scale(1); }
      100% { transform: translateY(-25px) rotate(5deg) scale(1.05); }
    }

    /* contenedor principal del juego - responsive */
    .game-wrapper {
      background-color: rgba(255, 245, 247, 0.8);
      backdrop-filter: blur(4px);
      border-radius: 48px 48px 32px 32px;
      box-shadow: 0 25px 40px -10px rgba(201, 80, 110, 0.4), 0 0 0 2px #ffe2e9 inset;
      padding: 20px 20px 25px 20px;
      width: min(680px, 100%);
      position: relative;
      z-index: 10;
    }

    /* encabezado romántico */
    .header {
      text-align: center;
      margin-bottom: 5px;
    }

    .header h1 {
      font-size: clamp(1.8rem, 8vw, 2.7rem); /* responsive */
      font-weight: 600;
      color: #a6365a;
      text-shadow: 3px 3px 0 #ffc2cf;
      letter-spacing: 1px;
      word-break: break-word;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .header h1 span {
      font-size: clamp(2rem, 7vw, 2.9rem);
      filter: drop-shadow(0 4px 4px #fba3b6);
      animation: latido 1s infinite ease-in-out;
    }

    @keyframes latido {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.15); }
    }

    /* contador bonito */
    .puntaje {
      background: #ffd3db;
      border-radius: 60px;
      padding: 8px 20px;
      display: inline-block;
      margin: 5px 0 5px;
      box-shadow: 0 6px 0 #d47a93, 0 10px 15px #ffb6c1;
    }

    .puntaje p {
      font-size: clamp(1.5rem, 6vw, 2rem);
      font-weight: 600;
      color: #872341;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .puntaje span {
      background-color: #ffffffd9;
      border-radius: 50%;
      width: 50px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 1.8rem;
      box-shadow: 0 2px 8px #df7b98;
      color: #c7416b;
    }

    /* Lienzo del juego - tamaño responsive manteniendo proporción */
    .canvas-container {
      background: #ffeef1;
      border-radius: 40px;
      padding: 12px;
      box-shadow: inset 0 -5px 0 #eeb7c3, 0 15px 25px #efa7b9;
      margin: 10px 0 10px;
      border: 3px solid white;
    }

    canvas {
      display: block;
      width: 100%;
      height: auto;
      aspect-ratio: 600 / 400; /* mantiene proporción 3:2 */
      background: #fff0f3;
      border-radius: 28px;
      cursor: none; /* más inmersivo en desktop */
      box-shadow: 0 4px 12px rgba(170, 80, 100, 0.3);
      margin: 0 auto;
      touch-action: none; /* evita gestos táctiles como scroll dentro del canvas */
    }

    /* mensaje final (oculto al inicio) */
    .mensaje-final {
      background: #fdd8e4;
      border-radius: 40px;
      padding: 15px 15px;
      margin: 15px 0 10px;
      text-align: center;
      border: 3px dashed #ff98b5;
      transition: all 0.4s ease;
      opacity: 0;
      transform: scale(0.8);
      pointer-events: none;
    }

    .mensaje-final.mostrar {
      opacity: 1;
      transform: scale(1);
      pointer-events: auto;
      background: #ffd5e0;
      box-shadow: 0 0 0 6px #fec7d3, 0 20px 30px #f5a9bb;
    }

    .mensaje-final h2 {
      font-size: clamp(1.5rem, 5vw, 2.2rem);
      color: #a1294b;
      line-height: 1.4;
    }

    .mensaje-final p {
      font-size: clamp(1.8rem, 6vw, 2.5rem);
      margin-top: 8px;
      animation: flotar 2s infinite;
    }

    @keyframes flotar {
      0% { transform: translateY(0); }
      50% { transform: translateY(-7px); }
    }

    /* controles y nota - adaptado para móvil */
    .controles {
      display: flex;
      flex-direction: row;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 10px;
      color: #a53f60;
      font-weight: 500;
      background: #ffecf0;
      padding: 10px 15px;
      border-radius: 50px;
      margin-top: 5px;
    }

    .teclas {
      background: #fbbac9;
      padding: 8px 14px;
      border-radius: 30px;
      color: #3f202b;
      font-size: clamp(0.9rem, 4vw, 1.2rem);
      letter-spacing: 2px;
      box-shadow: 0 3px 0 #d47994;
      white-space: nowrap;
    }

    /* Botones táctiles para móvil */
    .touch-controls {
      display: flex;
      gap: 15px;
      justify-content: center;
      margin: 8px 0 5px;
    }

    .touch-btn {
      background: #ffb3c6;
      border: none;
      font-size: 2.2rem;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      font-weight: bold;
      color: #611f35;
      cursor: pointer;
      box-shadow: 0 6px 0 #b95c78, 0 8px 15px rgba(185, 92, 120, 0.4);
      transition: all 0.07s;
      border: 3px solid #ffeef2;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    }

    .touch-btn:active {
      transform: translateY(6px);
      box-shadow: 0 2px 0 #b95c78, 0 5px 12px rgba(185, 92, 120, 0.4);
    }

    /* Ocultar botones táctiles en desktop, mostrar en móvil */
    @media (min-width: 768px) {
      .touch-controls {
        display: none;
      }
    }

    @media (max-width: 767px) {
      .touch-controls {
        display: flex;
      }
      .teclas {
        display: none; /* ocultamos indicación de teclas en móvil */
      }
      .reset-btn {
        font-size: 1.2rem;
        padding: 8px 16px;
      }
    }

    .reset-btn {
      background: #ffb3c6;
      border: none;
      font-size: clamp(1.2rem, 4vw, 1.4rem);
      padding: 10px 20px;
      border-radius: 40px;
      font-weight: bold;
      color: #611f35;
      cursor: pointer;
      box-shadow: 0 5px 0 #b95c78;
      transition: all 0.07s;
      border: 2px solid #ffeef2;
      touch-action: manipulation;
    }

    .reset-btn:active {
      transform: translateY(5px);
      box-shadow: 0 1px 0 #b95c78;
    }

    .reset-btn:hover {
      background: #ffc2d4;
    }
  </style>
</head>
<body>
<div class="game-wrapper">
  <div class="header">
    <h1>
      <span>❤️</span> Atrapa los corazones <span>❤️</span>
    </h1>
  </div>

  <!-- PUNTAJE (corazones atrapados / 10) -->
  <div class="puntaje">
    <p>
      <span id="contador-numero">0</span> / 10 💕
    </p>
  </div>

  <!-- Contenedor del canvas -->
  <div class="canvas-container">
    <canvas id="juegoCanvas" width="600" height="400"></canvas>
  </div>

  <!-- Controles táctiles para móvil (visibles solo en pantallas pequeñas) -->
  <div class="touch-controls">
    <button class="touch-btn" id="touchLeft" aria-label="Mover izquierda">←</button>
    <button class="touch-btn" id="touchRight" aria-label="Mover derecha">→</button>
  </div>

  <!-- Mensaje romántico final -->
  <div class="mensaje-final" id="pantallaFinal">
    <h2>✨ ¡Ganaste mi corazón para siempre! ✨</h2>
    <p>❤️ ❤️ ❤️</p>
  </div>

  <!-- Controles y botón de reinicio -->
  <div class="controles">
    <div class="teclas">←  →  mueven la caja</div>
    <button class="reset-btn" id="reiniciarBtn">💞 Jugar de nuevo</button>
  </div>
</div>

<script>
  (function() {
    // ----------------------------------------------------------------
    // JUEGO: ATRAPA CORAZONES ROMÁNTICO - VERSIÓN MÓVIL + DESKTOP
    // Funcionalidad: corazones cayendo, caja inferior, 10 atrapados → mensaje
    // Controles: teclado (desktop) + botones táctiles (móvil)
    // ----------------------------------------------------------------

    // ----- ELEMENTOS DEL DOM -----
    const canvas = document.getElementById('juegoCanvas');
    const ctx = canvas.getContext('2d');
    const contadorSpan = document.getElementById('contador-numero');
    const pantallaFinalDiv = document.getElementById('pantallaFinal');
    const botonReiniciar = document.getElementById('reiniciarBtn');
    const touchLeft = document.getElementById('touchLeft');
    const touchRight = document.getElementById('touchRight');

    // ----- CONSTANTES -----
    const ANCHO = canvas.width;        // 600px
    const ALTO = canvas.height;        // 400px
    const JUGADOR_ANCHO = 90;
    const JUGADOR_ALTO = 28;
    const JUGADOR_Y = ALTO - JUGADOR_ALTO - 15;  // 357px
    const RADIO_CORAZON = 18;
    const VELOCIDAD_CAIDA = 1.6;
    const MAX_CORAZONES = 15;
    const META = 10;
    const PASO_MOVIMIENTO = 18; // píxeles por movimiento

    // ----- VARIABLES DE ESTADO -----
    let jugadorX = (ANCHO - JUGADOR_ANCHO) / 2;
    let corazones = [];
    let puntaje = 0;
    let juegoActivo = true;
    let animacionFrame = null;

    // ----- VARIABLES PARA CONTROL TÁCTIL CONTINUO -----
    let intervaloIzquierda = null;
    let intervaloDerecha = null;

    // ----- FUNCIÓN PARA REINICIAR -----
    function reiniciarJuego() {
      if (animacionFrame) {
        cancelAnimationFrame(animacionFrame);
        animacionFrame = null;
      }

      jugadorX = (ANCHO - JUGADOR_ANCHO) / 2;
      corazones = [];
      puntaje = 0;
      juegoActivo = true;

      pantallaFinalDiv.classList.remove('mostrar');
      contadorSpan.innerText = puntaje;

      actualizarCanvas();
    }

    // ----- AÑADIR CORAZÓN -----
    function agregarCorazon() {
      if (!juegoActivo) return;
      if (corazones.length >= MAX_CORAZONES) return;

      const x = Math.random() * (ANCHO - 2 * RADIO_CORAZON) + RADIO_CORAZON;
      corazones.push({
        x: x,
        y: -RADIO_CORAZON
      });
    }

    // ----- DETECTAR COLISIONES -----
    function revisarColisiones() {
      if (!juegoActivo) return;

      for (let i = corazones.length - 1; i >= 0; i--) {
        const cor = corazones[i];
        const centroCorX = cor.x;
        const centroCorY = cor.y;

        const jugIzq = jugadorX;
        const jugDer = jugadorX + JUGADOR_ANCHO;
        const jugSup = JUGADOR_Y;
        const jugInf = JUGADOR_Y + JUGADOR_ALTO;

        let distanciaX = 0;
        let distanciaY = 0;

        if (centroCorX < jugIzq) {
          distanciaX = jugIzq - centroCorX;
        } else if (centroCorX > jugDer) {
          distanciaX = centroCorX - jugDer;
        }

        if (centroCorY < jugSup) {
          distanciaY = jugSup - centroCorY;
        } else if (centroCorY > jugInf) {
          distanciaY = centroCorY - jugInf;
        }

        const distancia = Math.sqrt(distanciaX * distanciaX + distanciaY * distanciaY);

        if (distancia <= RADIO_CORAZON) {
          corazones.splice(i, 1);

          if (juegoActivo) {
            puntaje = Math.min(puntaje + 1, META);
            contadorSpan.innerText = puntaje;
            destelloAtrapado();

            if (puntaje >= META) {
              juegoActivo = false;
              pantallaFinalDiv.classList.add('mostrar');
            }
          }
        }
      }
    }

    // ----- EFECTO DESTELLO -----
    function destelloAtrapado() {
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#ffe2f0';
      ctx.fillRect(0, 0, ANCHO, ALTO);
      ctx.restore();
    }

    // ----- MOVER CORAZONES -----
    function moverCorazones() {
      if (!juegoActivo) return;

      for (let i = corazones.length - 1; i >= 0; i--) {
        const cor = corazones[i];
        cor.y += VELOCIDAD_CAIDA;

        if (cor.y - RADIO_CORAZON > ALTO) {
          corazones.splice(i, 1);
        }
      }
    }

    // ----- DIBUJAR -----
    function dibujar() {
      ctx.clearRect(0, 0, ANCHO, ALTO);

      const gradiente = ctx.createLinearGradient(0, 0, 0, ALTO);
      gradiente.addColorStop(0, '#ffddee');
      gradiente.addColorStop(1, '#ffe4ed');
      ctx.fillStyle = gradiente;
      ctx.fillRect(0, 0, ANCHO, ALTO);

      for (let cor of corazones) {
        ctx.font = `${RADIO_CORAZON * 2}px 'Segoe UI', 'Arial Unicode MS', 'Helvetica', sans-serif`;
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.shadowColor = '#f9a8b8';
        ctx.shadowBlur = 12;
        ctx.fillStyle = '#ff3366';
        ctx.fillText('❤️', cor.x, cor.y);
        ctx.shadowBlur = 0;
      }

      ctx.shadowColor = '#c06f84';
      ctx.shadowBlur = 14;
      ctx.fillStyle = '#ff88aa';
      ctx.beginPath();
      ctx.roundRect(jugadorX, JUGADOR_Y, JUGADOR_ANCHO, JUGADOR_ALTO, 20);
      ctx.fill();

      ctx.shadowBlur = 8;
      ctx.font = '22px "Segoe UI"';
      ctx.fillStyle = '#ffffffd9';
      ctx.fillText('❤️', jugadorX + 15, JUGADOR_Y + 22);
      ctx.fillText('❤️', jugadorX + JUGADOR_ANCHO - 40, JUGADOR_Y + 22);

      ctx.shadowBlur = 0;

      ctx.beginPath();
      ctx.strokeStyle = '#ffb0c3';
      ctx.lineWidth = 4;
      ctx.setLineDash([6, 8]);
      ctx.moveTo(0, JUGADOR_Y - 4);
      ctx.lineTo(ANCHO, JUGADOR_Y - 4);
      ctx.stroke();
      ctx.setLineDash([]);

      if (!juegoActivo) {
        ctx.fillStyle = '#ffc0cb70';
        ctx.fillRect(0, 0, ANCHO, ALTO);
        ctx.font = 'bold 30px "Quicksand"';
        ctx.fillStyle = '#b34164';
        ctx.shadowBlur = 15;
        ctx.shadowColor = '#fbc1d0';
        ctx.fillText('💞', 250, 180);
        ctx.shadowBlur = 0;
      }
    }

    // Helper rectángulo redondeado
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
      if (w < 2 * r) r = w / 2;
      if (h < 2 * r) r = h / 2;
      this.moveTo(x + r, y);
      this.lineTo(x + w - r, y);
      this.quadraticCurveTo(x + w, y, x + w, y + r);
      this.lineTo(x + w, y + h - r);
      this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      this.lineTo(x + r, y + h);
      this.quadraticCurveTo(x, y + h, x, y + h - r);
      this.lineTo(x, y + r);
      this.quadraticCurveTo(x, y, x + r, y);
      return this;
    };

    // ----- BUCLE PRINCIPAL -----
    function actualizarCanvas() {
      if (!juegoActivo) {
        dibujar();
        animacionFrame = requestAnimationFrame(actualizarCanvas);
        return;
      }

      moverCorazones();
      revisarColisiones();
      dibujar();

      if (Math.random() < 0.02) {
        agregarCorazon();
      }

      animacionFrame = requestAnimationFrame(actualizarCanvas);
    }

    // ----- FUNCIONES DE MOVIMIENTO -----
    function moverIzquierda() {
      if (juegoActivo) {
        jugadorX = Math.max(0, jugadorX - PASO_MOVIMIENTO);
      }
    }

    function moverDerecha() {
      if (juegoActivo) {
        jugadorX = Math.min(ANCHO - JUGADOR_ANCHO, jugadorX + PASO_MOVIMIENTO);
      }
    }

    // ----- CONTROL POR TECLADO (DESKTOP) -----
    function manejarTeclado(e) {
      if (!juegoActivo) return;

      const tecla = e.key;
      if (tecla === 'ArrowLeft' || tecla === 'ArrowRight') {
        e.preventDefault();
      }

      if (tecla === 'ArrowLeft') {
        moverIzquierda();
      } else if (tecla === 'ArrowRight') {
        moverDerecha();
      }
    }

    // ----- CONTROL TÁCTIL (MÓVIL) -----
    function iniciarMovimientoIzquierda() {
      if (!juegoActivo) return;
      // Movimiento inmediato
      moverIzquierda();
      // Movimiento continuo mientras se mantenga pulsado
      if (intervaloIzquierda) clearInterval(intervaloIzquierda);
      intervaloIzquierda = setInterval(() => {
        moverIzquierda();
      }, 60); // 60ms entre movimientos para sensación suave
    }

    function detenerMovimientoIzquierda() {
      if (intervaloIzquierda) {
        clearInterval(intervaloIzquierda);
        intervaloIzquierda = null;
      }
    }

    function iniciarMovimientoDerecha() {
      if (!juegoActivo) return;
      moverDerecha();
      if (intervaloDerecha) clearInterval(intervaloDerecha);
      intervaloDerecha = setInterval(() => {
        moverDerecha();
      }, 60);
    }

    function detenerMovimientoDerecha() {
      if (intervaloDerecha) {
        clearInterval(intervaloDerecha);
        intervaloDerecha = null;
      }
    }

    // ----- REGISTRAR EVENTOS -----
    window.addEventListener('keydown', manejarTeclado);

    // Prevenir scroll con flechas en toda la página
    window.addEventListener('keydown', (e) => {
      if (e.key === 'ArrowLeft' || e.key === 'ArrowRight') {
        e.preventDefault();
      }
    }, { passive: false });

    // Eventos táctiles para móvil
    touchLeft.addEventListener('touchstart', (e) => {
      e.preventDefault();
      iniciarMovimientoIzquierda();
    });
    touchLeft.addEventListener('touchend', (e) => {
      e.preventDefault();
      detenerMovimientoIzquierda();
    });
    touchLeft.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      detenerMovimientoIzquierda();
    });

    touchRight.addEventListener('touchstart', (e) => {
      e.preventDefault();
      iniciarMovimientoDerecha();
    });
    touchRight.addEventListener('touchend', (e) => {
      e.preventDefault();
      detenerMovimientoDerecha();
    });
    touchRight.addEventListener('touchcancel', (e) => {
      e.preventDefault();
      detenerMovimientoDerecha();
    });

    // También soporte para mouse en caso de que alguien haga clic en los botones (útil en tablets con lápiz)
    touchLeft.addEventListener('mousedown', (e) => {
      e.preventDefault();
      iniciarMovimientoIzquierda();
    });
    touchLeft.addEventListener('mouseup', () => {
      detenerMovimientoIzquierda();
    });
    touchLeft.addEventListener('mouseleave', () => {
      detenerMovimientoIzquierda();
    });

    touchRight.addEventListener('mousedown', (e) => {
      e.preventDefault();
      iniciarMovimientoDerecha();
    });
    touchRight.addEventListener('mouseup', () => {
      detenerMovimientoDerecha();
    });
    touchRight.addEventListener('mouseleave', () => {
      detenerMovimientoDerecha();
    });

    // Botón reiniciar
    botonReiniciar.addEventListener('click', () => {
      reiniciarJuego();
    });

    // Iniciar juego
    reiniciarJuego();

    // Añadir corazones iniciales
    for (let i = 0; i < 4; i++) {
      setTimeout(() => agregarCorazon(), i * 200);
    }
  })();
</script>
</body>
</html>
